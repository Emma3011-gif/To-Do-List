<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='3') }}">
    <title>Domix</title>
</head>
<body>
    <div class="bg-orb bg-orb--top"></div>
    <div class="bg-orb bg-orb--bottom"></div>

    <header class="header">
        <div class="header__top">
            <div>
                <h1 class="header__title">Domix</h1>
                <p class="header__stats" id="task-stats">Loading...</p>
            </div>
            <div class="glass glass--small">
                <div class="header__badge">
                    <div class="status-dot"></div>
                    <span id="task-count">0</span>
                </div>
            </div>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Done</button>
        </div>
    </header>

    <main class="task-list" id="task-list"></main>

    <section id="profile-section" class="profile-section hidden">
        <div class="profile-header glass">
            <div class="profile-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <h2 class="profile-name" id="profile-name">Guest User</h2>
            <p class="profile-email" id="profile-email">guest@example.com</p>
        </div>
        <div class="profile-stats glass">
            <div class="stat-item">
                <span class="stat-number" id="stat-total">0</span>
                <span class="stat-label">Total Tasks</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-active">0</span>
                <span class="stat-label">Active</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-completed">0</span>
                <span class="stat-label">Completed</span>
            </div>
        </div>
        <div class="profile-actions">
            <button class="action-btn" onclick="exportTasks()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="action-icon">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Export Tasks
            </button>
            <button class="action-btn" onclick="clearCompleted()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="action-icon">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                </svg>
                Clear Completed
            </button>
            <button class="action-btn action-btn--danger" onclick="logout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="action-icon">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Sign Out
            </button>
        </div>
    </section>

    <div id="empty-state" class="empty-state hidden">
        <div class="empty-state__icon">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
        </div>
        <p class="empty-state__title">No tasks yet</p>
        <p class="empty-state__subtitle">Tap the + button to create your first task</p>
    </div>

    <button id="fab" class="fab" aria-label="Add task">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <div id="task-modal" class="modal hidden">
        <div class="modal__overlay" id="modal-overlay"></div>
        <div class="modal__content">
            <div class="modal__handle"></div>
            <h2 class="modal__title">Create New Task</h2>
            <form id="task-form" class="modal__form">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" id="task-title" placeholder="What needs to be done?" required class="form-input">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" id="task-date" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Time</label>
                        <input type="time" id="task-time" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <div class="pill-group" id="category-pills">
                        <button type="button" class="pill" data-category="study">Study</button>
                        <button type="button" class="pill" data-category="education">Education</button>
                        <button type="button" class="pill" data-category="shopping">Shopping</button>
                        <button type="button" class="pill" data-category="daily">Daily</button>
                        <button type="button" class="pill" data-category="life">Life</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="task-description" placeholder="Add details..." rows="3" class="form-input form-textarea"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Link (Optional)</label>
                    <input type="url" id="task-link" placeholder="https://example.com" class="form-input">
                </div>
                <button type="submit" class="btn-primary">Create Task</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" data-nav="home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
        </button>
        <button class="nav-item" data-nav="tasks">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4"></path>
                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
            </svg>
            <span>Tasks</span>
        </button>
        <button class="nav-item" data-nav="calendar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Calendar</span>
        </button>
        <button class="nav-item" data-nav="profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </button>
    </nav>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
